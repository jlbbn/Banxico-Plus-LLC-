name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Schema validation
        run: |
          echo "Verificando shared/schema.ts..."
          npx tsx --eval "import('./shared/schema.ts').then(() => { console.log('✅ Schema OK'); process.exit(0); }).catch(e => { console.error('❌', e.message); process.exit(1); })"
        continue-on-error: true
