version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Mexico_City"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    ignore:
      - dependency-name: "express"
        versions: ["5.x"]
      - dependency-name: "react"
        versions: ["19.x"]
      - dependency-name: "vite"
        versions: ["6.x"]
      - dependency-name: "tailwindcss"
        versions: ["4.x"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
